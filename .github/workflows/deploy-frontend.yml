name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Одновременно — только один деплой Pages.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/agro-inventory-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/agro-inventory-web/package-lock.json

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          # Подпуть GitHub Pages: https://<owner>.github.io/<repo>/
          VITE_BASE: /accounting_system_Selhoz/
          # Полный адрес API на Railway. Задайте repository variable VITE_API_BASE,
          # например: https://<app>.up.railway.app/api
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}

      # SPA-фолбэк: прямой заход на вложенный роут не должен давать 404.
      - name: SPA 404 fallback
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/agro-inventory-web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
